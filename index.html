<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyncUp — Find time together</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">

  <!-- ── Header ───────────────────────────── -->
  <header class="app-header" id="app-header" style="display:none">
    <div class="logo">Sync<span>Up</span></div>
    <div class="header-user">
      <strong id="header-username"></strong>
      <button class="btn-ghost" id="btn-logout">Sign out</button>
    </div>
  </header>

  <!-- ── Auth Page ────────────────────────── -->
  <div class="page" id="page-auth">
    <div class="auth-box">
      <div class="auth-hero">
        <div class="logo-big">Sync<span>Up</span></div>
        <p>Find the times that work for everyone</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign in</button>
        <button class="auth-tab" data-tab="register">Create account</button>
      </div>

      <!-- Login form -->
      <div id="form-login" class="auth-form">
        <div class="card">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="login-username" placeholder="your_username" autocomplete="username" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <div class="form-error" id="login-error"></div>
          <button class="btn btn-primary btn-full" id="btn-login" style="margin-top:8px">Sign in</button>
        </div>
      </div>

      <!-- Register form -->
      <div id="form-register" class="auth-form" style="display:none">
        <div class="card">
          <div class="form-group">
            <label>Display name</label>
            <input type="text" id="reg-name" placeholder="Alex Smith" autocomplete="name" />
          </div>
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="reg-username" placeholder="alex_smith" autocomplete="username" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="alex@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Password <span style="color:var(--text-mute);font-weight:400">(min. 6 chars)</span></label>
            <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" />
          </div>
          <div class="form-error" id="register-error"></div>
          <button class="btn btn-primary btn-full" id="btn-register" style="margin-top:8px">Create account</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── App Page ──────────────────────────── -->
  <div class="page" id="page-app">

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-section">
        <h3>Me</h3>
        <button class="nav-item" data-panel="panel-availability">
          <span class="icon">🗓️</span> My availability
        </button>
      </div>

      <div class="sidebar-section">
        <h3>Groups</h3>
        <div class="group-list" id="group-list">
          <!-- rendered by JS -->
        </div>
        <button class="nav-item" id="btn-open-create" style="margin-top:6px">
          <span class="icon">＋</span> New group
        </button>
        <button class="nav-item" id="btn-open-join">
          <span class="icon">🔗</span> Join with code
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">

      <!-- ── Availability Panel ── -->
      <div class="panel" id="panel-availability">
        <div class="panel-header">
          <div>
            <h2>My availability</h2>
            <p>Click cells to mark when you're free (6 AM – 11 PM). Your friends will see overlaps.</p>
          </div>
          <button class="btn btn-primary" id="btn-save-availability">Save availability</button>
        </div>

        <div class="grid-container">
          <div id="availability-grid">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- ── Group Panel ── -->
      <div class="panel" id="panel-group">
        <div class="panel-header">
          <div>
            <h2 id="group-title">Group</h2>
            <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
              <span style="font-size:0.82rem;color:var(--text-mute)">Invite code:</span>
              <span class="invite-code" id="group-invite-code" title="Click to copy">——</span>
            </div>
          </div>
        </div>
        <div id="group-content">
          <div class="spinner"></div>
        </div>
      </div>

    </main>
  </div>

</div><!-- /.app -->

<!-- ── Modals ──────────────────────────────── -->

<!-- Create group -->
<div class="modal-overlay" id="modal-create-group">
  <div class="modal">
    <button class="modal-close" data-close-modal="modal-create-group">✕</button>
    <h3>Create a group</h3>
    <div class="form-group">
      <label>Group name</label>
      <input type="text" id="new-group-name" placeholder="Weekend crew, Book club…" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close-modal="modal-create-group">Cancel</button>
      <button class="btn btn-primary" id="btn-create-group">Create group</button>
    </div>
  </div>
</div>

<!-- Join group -->
<div class="modal-overlay" id="modal-join-group">
  <div class="modal">
    <button class="modal-close" data-close-modal="modal-join-group">✕</button>
    <h3>Join a group</h3>
    <div class="form-group">
      <label>Invite code</label>
      <input type="text" id="join-code" placeholder="ABCD1234" style="text-transform:uppercase;letter-spacing:2px" maxlength="12" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close-modal="modal-join-group">Cancel</button>
      <button class="btn btn-primary" id="btn-join-group">Join group</button>
    </div>
  </div>
</div>

<!-- ── Toast container ── -->
<div class="toast-container" id="toast-container"></div>

<script src="js/app.js"></script>
</body>
</html>
